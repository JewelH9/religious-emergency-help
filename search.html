<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Guides — Religious Emergency Help</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .search-page {
        padding-top: calc(var(--nav-height) + var(--space-10));
        padding-bottom: var(--space-16);
        min-height: 100vh;
      }

      /* ---- Search Header ---- */
      .search-header {
        background: var(--color-bg-dark);
        padding: calc(var(--nav-height) + var(--space-10)) 0 var(--space-10);
        margin-top: calc(-1 * (var(--nav-height) + var(--space-10)));
      }
      .search-header h1 {
        font-size: var(--font-size-3xl);
        font-weight: 800;
        color: #ffffff;
        margin-bottom: var(--space-2);
        text-align: center;
      }
      .search-header p {
        color: #94a3b8;
        text-align: center;
        margin-bottom: var(--space-8);
        font-size: var(--font-size-lg);
      }

      /* ---- Search Input ---- */
      .search-input-wrap {
        position: relative;
        max-width: 640px;
        margin: 0 auto;
      }
      .search-main-input {
        width: 100%;
        padding: var(--space-5) var(--space-5) var(--space-5) 3.5rem;
        font-size: var(--font-size-lg);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: var(--radius-full);
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        outline: none;
        transition: all var(--transition);
      }
      .search-main-input::placeholder {
        color: #64748b;
      }
      .search-main-input:focus {
        border-color: var(--color-emergency);
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
      }
      .search-main-icon {
        position: absolute;
        left: var(--space-5);
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.25rem;
        pointer-events: none;
      }
      .search-clear-btn {
        position: absolute;
        right: var(--space-4);
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #94a3b8;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 0.875rem;
        display: none;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
      }
      .search-clear-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        color: #ffffff;
      }
      .search-clear-btn.visible {
        display: flex;
      }

      /* ---- Filter Pills ---- */
      .filter-row {
        display: flex;
        gap: var(--space-2);
        justify-content: center;
        flex-wrap: wrap;
        margin-top: var(--space-6);
      }
      .filter-pill {
        padding: var(--space-2) var(--space-4);
        border-radius: var(--radius-full);
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: transparent;
        color: #94a3b8;
        font-size: var(--font-size-sm);
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
      }
      .filter-pill:hover {
        border-color: rgba(255, 255, 255, 0.4);
        color: #ffffff;
      }
      .filter-pill.active {
        background: var(--color-emergency);
        border-color: var(--color-emergency);
        color: #ffffff;
      }

      /* ---- Content Area ---- */
      .search-content {
        padding: var(--space-10) 0;
      }

      /* ---- Stats bar ---- */
      .results-stats {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-6);
        padding-bottom: var(--space-4);
        border-bottom: 1px solid var(--color-border);
        flex-wrap: wrap;
        gap: var(--space-3);
      }
      .results-count {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
      }
      .results-count strong {
        color: var(--color-text-primary);
      }
      .sort-select {
        padding: var(--space-2) var(--space-3);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        background: var(--color-bg-card);
        cursor: pointer;
      }

      /* ---- Result Card ---- */
      .result-card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
        margin-bottom: var(--space-3);
        display: flex;
        gap: var(--space-4);
        align-items: flex-start;
        text-decoration: none;
        color: inherit;
        transition: all var(--transition);
        animation: fadeInUp 0.2s ease forwards;
      }
      .result-card:hover {
        border-color: var(--result-color, var(--color-primary));
        box-shadow: var(--shadow-sm);
        transform: translateX(4px);
        color: inherit;
      }
      .result-icon {
        width: 44px;
        height: 44px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        flex-shrink: 0;
        background: color-mix(
          in srgb,
          var(--result-color, var(--color-primary)) 12%,
          transparent
        );
      }
      .result-body {
        flex: 1;
        min-width: 0;
      }
      .result-meta {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        margin-bottom: var(--space-1);
      }
      .result-religion {
        font-size: var(--font-size-xs);
        font-weight: 700;
        color: var(--result-color, var(--color-primary));
      }
      .result-type-badge {
        font-size: var(--font-size-xs);
        padding: 1px var(--space-2);
        border-radius: var(--radius-full);
        background: var(--color-bg-page);
        color: var(--color-text-muted);
        border: 1px solid var(--color-border);
      }
      .result-title {
        font-size: var(--font-size-base);
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .result-detail {
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .result-arrow {
        color: var(--color-text-muted);
        flex-shrink: 0;
        align-self: center;
        font-size: 1rem;
      }

      /* ---- Highlight matching text ---- */
      .highlight {
        background: #fef08a;
        color: #713f12;
        border-radius: 2px;
        padding: 0 2px;
      }

      /* ---- Group header ---- */
      .result-group-header {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        margin: var(--space-8) 0 var(--space-4);
        padding-bottom: var(--space-3);
        border-bottom: 2px solid var(--color-border);
      }
      .result-group-icon {
        font-size: 1.5rem;
      }
      .result-group-name {
        font-size: var(--font-size-xl);
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .result-group-count {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
        margin-left: auto;
      }

      /* ---- States ---- */
      .search-state {
        text-align: center;
        padding: var(--space-16) var(--space-4);
      }
      .search-state-icon {
        font-size: 3.5rem;
        margin-bottom: var(--space-4);
      }
      .search-state-title {
        font-size: var(--font-size-2xl);
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-3);
      }
      .search-state-text {
        color: var(--color-text-secondary);
        max-width: 400px;
        margin: 0 auto var(--space-6);
        line-height: 1.6;
      }

      /* ---- Popular searches ---- */
      .popular-section {
        margin-top: var(--space-2);
      }
      .popular-title {
        font-size: var(--font-size-sm);
        font-weight: 700;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: var(--space-4);
      }
      .popular-tags {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }
      .popular-tag {
        padding: var(--space-2) var(--space-4);
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-full);
        font-size: var(--font-size-sm);
        cursor: pointer;
        transition: all var(--transition);
        color: var(--color-text-secondary);
      }
      .popular-tag:hover {
        border-color: var(--color-emergency);
        color: var(--color-emergency);
      }

      /* ---- Loading skeleton ---- */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--color-border) 25%,
          var(--color-bg-page) 50%,
          var(--color-border) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.2s infinite;
        border-radius: var(--radius-md);
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .skeleton-card {
        height: 80px;
        margin-bottom: var(--space-3);
        border-radius: var(--radius-lg);
      }
    </style>
  </head>
  <body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="nav-brand">
          <div class="nav-brand-icon">✚</div>
          <span>Emergency Help</span>
        </a>
        <div class="nav-links" id="navLinks">
          <a href="index.html" data-i18n="nav.home">Home</a>
          <a href="emergency.html" data-i18n="nav.emergency">Emergency</a>
          <a href="religion.html" data-i18n="nav.religions">Religions</a>
          <a href="search.html" data-i18n="nav.search" class="active">
            Search
          </a>
          <a href="bookmarks.html" data-i18n="nav.bookmarks">Bookmarks</a>
          <a href="emergency.html" class="nav-emergency-btn">⚡ Emergency</a>
        </div>
        <div class="nav-actions">
          <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="hi">हि</button>
            <button class="lang-btn" data-lang="bn">বাং</button>
          </div>
          <a href="login.html" class="btn btn-secondary btn-sm" id="authBtn">
            Sign In
          </a>
        </div>
        <button class="nav-toggle" id="navToggle">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <!-- ===== SEARCH HEADER ===== -->
    <div class="search-header">
      <div class="container">
        <h1 data-i18n="search.title">Search Guides</h1>
        <p>Find procedures, prayers and steps across all religions</p>

        <!-- Main search input -->
        <div class="search-input-wrap">
          <span class="search-main-icon">🔍</span>
          <input
            type="text"
            class="search-main-input"
            id="mainSearchInput"
            placeholder="Search by religion, ritual or keyword..."
            autocomplete="off"
            spellcheck="false"
          />
          <button
            class="search-clear-btn"
            id="clearBtn"
            onclick="clearSearch()"
          >
            ✕
          </button>
        </div>

        <!-- Filter pills -->
        <div class="filter-row">
          <button
            class="filter-pill active"
            data-filter="all"
            onclick="setFilter('all')"
          >
            All
          </button>
          <button
            class="filter-pill"
            data-filter="Emergency Step"
            onclick="setFilter('Emergency Step')"
          >
            ⚡ Emergency Steps
          </button>
          <button
            class="filter-pill"
            data-filter="Prayer"
            onclick="setFilter('Prayer')"
          >
            🙏 Prayers
          </button>
          <button
            class="filter-pill"
            data-filter="Guide"
            onclick="setFilter('Guide')"
          >
            📖 Guides
          </button>
        </div>
      </div>
    </div>

    <!-- ===== RESULTS AREA ===== -->
    <div class="search-content">
      <div class="container">
        <div id="resultsArea">
          <!-- Default state — popular searches -->
          <div class="search-state" id="defaultState">
            <div class="search-state-icon">🔍</div>
            <h2 class="search-state-title">Search All Guides</h2>
            <p class="search-state-text">
              Type a keyword to find emergency steps, prayers, funeral
              procedures and more across all 5 religions.
            </p>
            <div class="popular-section">
              <div class="popular-title">Popular Searches</div>
              <div class="popular-tags" id="popularTags"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/app.js"></script>
    <script type="module">
      import {
        initSearchIndex,
        searchGuides,
        groupByReligion,
      } from "./js/search.js";
      import { initAuthObserver } from "./js/auth.js";

      initAuthObserver();

      // ---- State ----
      let activeFilter = "all";
      let currentQuery = "";
      let debounceTimer = null;
      let indexReady = false;

      // Popular search terms
      const POPULAR = [
        "Janazah",
        "burial",
        "cremation",
        "prayer",
        "Ghusl",
        "Kafan",
        "Last Rites",
        "Akhand Path",
        "mourning",
        "funeral",
        "Shraddha",
        "merit",
      ];

      // ---- Init ----
      async function init() {
        buildPopularTags();

        // Check for ?q= param
        const queryParam = new URLSearchParams(window.location.search).get("q");

        // Load index
        showSkeleton();
        indexReady = await initSearchIndex();

        if (!indexReady) {
          showError();
          return;
        }

        if (queryParam) {
          document.getElementById("mainSearchInput").value = queryParam;
          currentQuery = queryParam;
          toggleClearBtn(true);
          runSearch(queryParam);
        } else {
          showDefaultState();
        }
      }

      // ---- Search input handler ----
      document
        .getElementById("mainSearchInput")
        .addEventListener("input", function () {
          const query = this.value.trim();
          currentQuery = query;
          toggleClearBtn(query.length > 0);

          // Update URL without reload
          const url = query
            ? `search.html?q=${encodeURIComponent(query)}`
            : "search.html";
          history.replaceState(null, "", url);

          clearTimeout(debounceTimer);

          if (query.length === 0) {
            showDefaultState();
            return;
          }

          if (query.length < 2) {
            showMinLengthHint();
            return;
          }

          // Debounce — wait 250ms after user stops typing
          debounceTimer = setTimeout(() => {
            runSearch(query);
          }, 250);
        });

      // ---- Run search ----
      function runSearch(query) {
        if (!indexReady) {
          showError();
          return;
        }

        let results = searchGuides(query);

        // Apply type filter
        if (activeFilter !== "all") {
          results = results.filter((r) => r.type === activeFilter);
        }

        renderResults(results, query);
      }

      // ---- Render results ----
      function renderResults(results, query) {
        const area = document.getElementById("resultsArea");

        if (results.length === 0) {
          area.innerHTML = buildNoResults(query);
          return;
        }

        const groups = groupByReligion(results);
        let html = buildStatsBar(results.length, query);

        groups.forEach((group) => {
          html += `
          <div class="result-group-header">
            <span class="result-group-icon">${group.icon}</span>
            <span class="result-group-name">${group.religion}</span>
            <span class="result-group-count">
              ${group.items.length} result${group.items.length !== 1 ? "s" : ""}
            </span>
          </div>
        `;
          group.items.forEach((item) => {
            html += buildResultCard(item, query);
          });
        });

        area.innerHTML = html;
      }

      // ---- Build a single result card ----
      function buildResultCard(item, query) {
        const title = highlight(item.title, query);
        const detail = highlight(item.detail, query);

        return `
        <a href="${item.url}"
           class="result-card"
           style="--result-color: ${item.color}">
          <div class="result-icon">${item.icon}</div>
          <div class="result-body">
            <div class="result-meta">
              <span class="result-religion">${item.religion}</span>
              <span class="result-type-badge">${item.type}</span>
            </div>
            <div class="result-title">${title}</div>
            <div class="result-detail">${detail}</div>
          </div>
          <span class="result-arrow">→</span>
        </a>
      `;
      }

      // ---- Highlight matching text ----
      function highlight(text, query) {
        if (!text || !query) return text || "";
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(`(${escaped})`, "gi");
        return text.replace(regex, '<mark class="highlight">$1</mark>');
      }

      // ---- Stats bar ----
      function buildStatsBar(count, query) {
        return `
        <div class="results-stats">
          <span class="results-count">
            <strong>${count}</strong>
            result${count !== 1 ? "s" : ""} for
            "<strong>${escapeHtml(query)}</strong>"
          </span>
          <select class="sort-select" onchange="handleSort(this.value)">
            <option value="relevance">Sort: Relevance</option>
            <option value="religion">Sort: By Religion</option>
            <option value="type">Sort: By Type</option>
          </select>
        </div>
      `;
      }

      // ---- Sort handler ----
      window.handleSort = function (value) {
        if (!currentQuery) return;
        let results = searchGuides(currentQuery);
        if (activeFilter !== "all") {
          results = results.filter((r) => r.type === activeFilter);
        }
        if (value === "religion") {
          results.sort((a, b) => a.religion.localeCompare(b.religion));
        } else if (value === "type") {
          results.sort((a, b) => a.type.localeCompare(b.type));
        }
        // Re-render with same query
        const area = document.getElementById("resultsArea");
        const groups = groupByReligion(results);
        let html = buildStatsBar(results.length, currentQuery);
        groups.forEach((group) => {
          html += `
          <div class="result-group-header">
            <span class="result-group-icon">${group.icon}</span>
            <span class="result-group-name">${group.religion}</span>
            <span class="result-group-count">
              ${group.items.length} result${group.items.length !== 1 ? "s" : ""}
            </span>
          </div>
        `;
          group.items.forEach((item) => {
            html += buildResultCard(item, currentQuery);
          });
        });
        area.innerHTML = html;
      };

      // ---- Filter handler ----
      window.setFilter = function (filter) {
        activeFilter = filter;
        document.querySelectorAll(".filter-pill").forEach((p) => {
          p.classList.toggle("active", p.dataset.filter === filter);
        });
        if (currentQuery.length >= 2) runSearch(currentQuery);
      };

      // ---- Clear search ----
      window.clearSearch = function () {
        const input = document.getElementById("mainSearchInput");
        input.value = "";
        currentQuery = "";
        toggleClearBtn(false);
        history.replaceState(null, "", "search.html");
        showDefaultState();
        input.focus();
      };

      // ---- Popular tag click ----
      window.popularSearch = function (term) {
        const input = document.getElementById("mainSearchInput");
        input.value = term;
        currentQuery = term;
        toggleClearBtn(true);
        history.replaceState(
          null,
          "",
          `search.html?q=${encodeURIComponent(term)}`,
        );
        runSearch(term);
        input.focus();
      };

      // ---- Build popular tags ----
      function buildPopularTags() {
        document.getElementById("popularTags").innerHTML = POPULAR.map(
          (term) => `
          <button class="popular-tag"
            onclick="popularSearch('${term}')">
            ${term}
          </button>
        `,
        ).join("");
      }

      // ---- States ----
      function showDefaultState() {
        document.getElementById("resultsArea").innerHTML = `
        <div class="search-state" id="defaultState">
          <div class="search-state-icon">🔍</div>
          <h2 class="search-state-title">Search All Guides</h2>
          <p class="search-state-text">
            Type a keyword to find emergency steps, prayers,
            funeral procedures and more across all 5 religions.
          </p>
          <div class="popular-section">
            <div class="popular-title">Popular Searches</div>
            <div class="popular-tags">
              ${POPULAR.map(
                (term) => `
                <button class="popular-tag"
                  onclick="popularSearch('${term}')">
                  ${term}
                </button>
              `,
              ).join("")}
            </div>
          </div>
        </div>
      `;
      }

      function showMinLengthHint() {
        document.getElementById("resultsArea").innerHTML = `
        <div class="search-state">
          <div class="search-state-icon">✏️</div>
          <p class="search-state-text">
            Keep typing — search starts after 2 characters.
          </p>
        </div>
      `;
      }

      function showSkeleton() {
        document.getElementById("resultsArea").innerHTML = `
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      `;
      }

      function showError() {
        document.getElementById("resultsArea").innerHTML = `
        <div class="search-state">
          <div class="search-state-icon">⚠️</div>
          <h2 class="search-state-title">Search Unavailable</h2>
          <p class="search-state-text">
            Could not load the search index.
            Please check your connection and refresh.
          </p>
          <button class="btn btn-primary"
            onclick="window.location.reload()">
            Refresh Page
          </button>
        </div>
      `;
      }

      function buildNoResults(query) {
        return `
        <div class="search-state">
          <div class="search-state-icon">🔎</div>
          <h2 class="search-state-title">No Results Found</h2>
          <p class="search-state-text">
            No matches for "<strong>${escapeHtml(query)}</strong>".
            Try a different keyword or browse by religion.
          </p>
          <div style="display:flex; gap:1rem;
                      justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-secondary"
              onclick="clearSearch()">
              Clear Search
            </button>
            <a href="religion.html" class="btn btn-primary">
              Browse Religions
            </a>
          </div>
          <div class="popular-section" style="margin-top:var(--space-8);">
            <div class="popular-title">Try these instead</div>
            <div class="popular-tags">
              ${POPULAR.slice(0, 6)
                .map(
                  (term) => `
                <button class="popular-tag"
                  onclick="popularSearch('${term}')">
                  ${term}
                </button>
              `,
                )
                .join("")}
            </div>
          </div>
        </div>
      `;
      }

      // ---- Helpers ----
      function toggleClearBtn(show) {
        document.getElementById("clearBtn").classList.toggle("visible", show);
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ---- Keyboard shortcut ---- (/ to focus search)
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
          e.preventDefault();
          document.getElementById("mainSearchInput").focus();
        }
      });

      // ---- Start ----
      init();
    </script>
    <script type="module">
      import { initAuthObserver, logOut } from "./js/auth.js";
      initAuthObserver();

      // Make sign out available globally
      window.handleSignOut = async function () {
        const result = await logOut();
        if (result.success) {
          showToast("Signed out successfully.");
          setTimeout(() => (window.location.href = "index.html"), 1000);
        }
      };
    </script>
  </body>
</html>

        position: sticky;
        top: var(--nav-height);
        z-index: 800;

        display: flex;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }

        display: none;
      }
      .tab-btn {
        padding: var(--space-4) var(--space-5);
        font-size: var(--font-size-sm);
        font-weight: 600;
        color: var(--color-text-muted);
        border: none;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        background: none;
        cursor: pointer;
        white-space: nowrap;
        transition: all var(--transition);

      .tab-btn:hover {
        color: var(--color-text-primary);
      }
      .tab-btn.active {
        color: var(--color-emergency);

      }

        padding: var(--space-10) 0 var(--space-16);

        display: none;

        display: block;
      }

        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: var(--space-8);
        align-items: start;
      }
      .overview-intro {
        font-size: var(--font-size-lg);
        color: var(--color-text-secondary);
        line-height: 1.8;
        margin-bottom: var(--space-6);
      }
      .key-facts {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
      }
      .key-facts h3 {
        font-size: var(--font-size-base);
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-4);
        padding-bottom: var(--space-3);
        border-bottom: 1px solid var(--color-border);
      }
      .fact-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-3) 0;
        border-bottom: 1px solid var(--color-border);
        font-size: var(--font-size-sm);

      .fact-row:last-child {
        border-bottom: none;
      }
      .fact-label {
        color: var(--color-text-muted);
        font-weight: 600;
        flex-shrink: 0;
      }
      .fact-value {
        color: var(--color-text-primary);
        text-align: right;
      }

        margin-bottom: var(--space-10);
      }

        border-bottom: 2px solid var(--color-border);
        display: flex;
        align-items: center;
        gap: var(--space-3);

        height: 40px;
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        background: var(--religion-bg, #f1f5f9);

      .prayer-card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
        margin-bottom: var(--space-6);
      }
      .prayer-name {
        font-size: var(--font-size-lg);
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-1);
      }
      .prayer-occasion {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
        margin-bottom: var(--space-4);
      }

        border-left: 3px solid var(--color-emergency);
        border-radius: 0 var(--radius-md) var(--radius-md) 0;
        padding: var(--space-4) var(--space-5);
        font-style: italic;
        color: var(--color-text-secondary);
        line-height: 1.8;
        margin-bottom: var(--space-3);
      }
      .prayer-meaning {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
      }

      /* ---- Checklist Panel ---- */
      .checklist-group {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
        margin-bottom: var(--space-6);

        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-4);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .checklist-item {
        display: flex;
        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-3) 0;
        border-bottom: 1px solid var(--color-border);
        cursor: pointer;
      }
      .checklist-item:last-child {
        border-bottom: none;
      }
      .checklist-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        accent-color: var(--color-success);
        cursor: pointer;
        flex-shrink: 0;
      }
      .checklist-item label {
        font-size: var(--font-size-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        line-height: 1.5;
      }
      .checklist-item.checked label {
        text-decoration: line-through;
        color: var(--color-text-muted);
      }
      .checklist-progress {
        height: 6px;
        background: var(--color-border);
        border-radius: var(--radius-full);
        margin-bottom: var(--space-4);
        overflow: hidden;
      }
      .checklist-progress-bar {
        height: 100%;
        background: var(--color-success);
        border-radius: var(--radius-full);
        transition: width var(--transition-slow);
      }
      .checklist-actions {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-6);
        flex-wrap: wrap;

        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: var(--space-4);
        margin-top: var(--space-8);

        background: var(--color-bg-card);

        border-radius: var(--radius-lg);

        text-decoration: none;
        color: inherit;

              icon: "🔥",
              steps: [
                {
                  n: 1,
                  t: "Monks determine auspicious timing",
                  d: "The senior monk or temple will advise on the appropriate date and time for the cremation.",
                },
                {
                  n: 2,
                  t: "Monks lead the cremation ceremony",
                  d: "Suttas are chanted throughout. The monks lead the proceedings as the family follows along.",
                },
                {
                  n: 3,
                  t: "Senior family member lights the pyre or presses the button",
                  d: "At the moment of cremation, monks chant powerfully to support the consciousness of the deceased.",
                },
                {
                  n: 4,
                  t: "Enshrine or scatter the ashes",
                  d: "Ashes may be placed in a stupa (reliquary), scattered at sea or in nature, or buried.",
                },
              ],
            },
          ],
          prayers: [
            {
              name: "Metta Sutta — Loving Kindness",
              occasion: "Chanted by monks during funeral ceremonies",
              arabic: "Karaniya metta suttaṃ — yadā pi sukhaṃ iccheyya...",
              transliteration:
                "Sabbe satta sukhi hontu, Sabbe satta averā hontu, Sabbe satta abyāpajjhā hontu, Sabbe satta anīghā hontu, Sabbe satta sukhī attānaṃ pariharantu.",
              meaning:
                "May all beings be happy. May all beings be free from enmity. May all beings be free from suffering. May all beings be free from anxiety. May all beings sustain themselves in happiness.",
            },
            {
              name: "Transference of Merit",
              occasion: "Recited while pouring water — the core mourning act",
              arabic: "Idaṃ vo ñātinaṃ hotu, sukhitā hontu ñātayo...",
              transliteration: "Idaṃ vo ñātinaṃ hotu, sukhitā hontu ñātayo",
              meaning:
                "May this (merit) be for our relatives. May our relatives be happy. The verse recited while pouring water to transfer merit to the deceased.",
            },
            {
              name: "Ti-Ratana — Three Jewels",
              occasion: "Recited at all Buddhist ceremonies",
              arabic: "Buddhaṃ saraṇaṃ gacchāmi...",
              transliteration:
                "Buddhaṃ saraṇaṃ gacchāmi, Dhammaṃ saraṇaṃ gacchāmi, Saṅghaṃ saraṇaṃ gacchāmi",
              meaning:
                "I take refuge in the Buddha. I take refuge in the Dhamma (teachings). I take refuge in the Sangha (community of monks).",
            },
          ],
          checklist: [
            {
              group: "⚡ Immediate",
              items: [
                "Maintain a calm and peaceful environment",
                "Contact your local Buddhist temple immediately",
                "Invite monks to begin chanting suttas",
                "Set up a candle, incense and flower altar",
                "Allow the body to rest undisturbed for 4–8 hours",
              ],
            },
            {
              group: "🙏 Chanting Ceremonies",
              items: [
                "Arrange monks for 3–7 evenings of chanting",
                "Prepare Dana (food or robes) to offer to monks",
                "Set up water vessel for merit transfer (Pattidana)",
                "Invite family and community to the chanting sessions",
              ],
            },
            {
              group: "🔥 Cremation",
              items: [
                "Confirm auspicious date with the monks",
                "Book cremation ground or facility",
                "Arrange monks to lead the cremation ceremony",
                "Prepare incense, flowers and candles for the ceremony",
                "Decide on ashes — stupa, scattering, or burial",
              ],
            },
            {
              group: "📅 Post Cremation",
              items: [
                "Arrange 7th day merit ceremony with monks",
                "Offer Dana to monks on behalf of the deceased",
                "Arrange 50th day merit ceremony",
                "Arrange 100th day merit ceremony",
                "Plan annual death anniversary merit ceremony",
              ],
            },
          ],
        },
      }; // end RELIGION_DATA

      // ============================================================
      // PAGE LOGIC
      // ============================================================

      let currentReligion = null;
      let checklistState = {};

      function initPage() {
        const param = getParam("r");
        if (param && RELIGION_DATA[param]) {
          loadReligion(param);
        }
        // else: show allReligionsView (default)
      }

      function loadReligion(religion) {
        const data = RELIGION_DATA[religion];
        if (!data) return;
        currentReligion = religion;

        // Hide all religions grid, show single view
        document.getElementById("allReligionsView").style.display = "none";
        document.getElementById("singleReligionView").style.display = "block";
        document.getElementById("tabBar").style.display = "block";

        // Update hero
        document.getElementById("heroIcon").textContent = data.icon;
        document.getElementById("heroTitle").textContent =
          data.name + " — Emergency Guide";
        document.getElementById("heroSubtitle").textContent = data.subtitle;

        // Tags
        document.getElementById("heroTags").innerHTML = data.tags
          .map((tag) => `<span class="guide-tag">${tag}</span>`)
          .join("");

        // Update page title
        document.title = `${data.name} Guide — Religious Emergency Help`;

        // Render all panels
        renderOverview(data);
        renderProcedures(data);
        renderPrayers(data);
        renderChecklist(data);

        // Tab click handlers
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => switchTab(btn.dataset.tab));
        });
      }

      function switchTab(tab) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
        document
          .querySelectorAll(".tab-panel")
          .forEach((p) =>
            p.classList.toggle("active", p.id === "panel-" + tab),
          );
      }

      // ---- Overview ----
      function renderOverview(data) {
        document.getElementById("overviewIntro").textContent = data.intro;
        document.getElementById("keyFacts").innerHTML = `
      <h3>Quick Facts</h3>
      ${data.facts
        .map(
          (f) => `
        <div class="fact-row">
          <span class="fact-label">${f.label}</span>
          <span class="fact-value">${f.value}</span>
        </div>
      `,
        )
        .join("")}
      <div style="margin-top:var(--space-4);">
        <a href="emergency.html?r=${currentReligion}"
           class="btn btn-emergency btn-full">
          ⚡ View Emergency Steps
        </a>
      </div>
    `;
      }

      // ---- Procedures ----
      function renderProcedures(data) {
        const html = data.procedures
          .map(
            (section) => `
      <div class="procedures-section">
        <h2 class="procedures-section-title">
          <span class="icon">${section.icon}</span>
          ${section.title}
        </h2>
        <div class="steps-list">
          ${section.steps
            .map(
              (step) => `
            <div class="step-item">
              <div class="step-number"
                style="background:${data.color}">${step.n}</div>
              <div class="step-content">
                <div class="step-title">${step.t}</div>
                <div class="step-description">${step.d}</div>
              </div>
            </div>
          `,
            )
            .join("")}
        </div>
      </div>
    `,
          )
          .join("");
        document.getElementById("proceduresContent").innerHTML = html;
      }

      // ---- Prayers ----
      function renderPrayers(data) {
        const html = data.prayers
          .map(
            (p) => `
      <div class="prayer-card">
        <div class="prayer-name">${p.name}</div>
        <div class="prayer-occasion">📍 ${p.occasion}</div>
        <div class="prayer-text">${p.arabic}</div>
        <p style="font-size:var(--font-size-sm);
                  color:var(--color-text-secondary);
                  margin-bottom:var(--space-3);
                  font-style:italic;">
          ${p.transliteration}
        </p>
        <div class="prayer-meaning">💡 ${p.meaning}</div>
      </div>
    `,
          )
          .join("");
        document.getElementById("prayersContent").innerHTML = html;
      }

      // ---- Checklist ----
      function renderChecklist(data) {
        // Load saved state from localStorage
        const saved = localStorage.getItem(`checklist_${currentReligion}`);
        checklistState = saved ? JSON.parse(saved) : {};

        // Count total items
        let totalItems = 0;
        data.checklist.forEach((g) => (totalItems += g.items.length));
        let checkedCount = Object.values(checklistState).filter(Boolean).length;

        const html = `
      <div style="margin-bottom:var(--space-6);">
        <div style="display:flex; justify-content:space-between;
                    align-items:center; margin-bottom:var(--space-2);">
          <span style="font-size:var(--font-size-sm);
                       font-weight:600;
                       color:var(--color-text-secondary);">
            Progress: ${checkedCount} / ${totalItems} completed
          </span>
          <span style="font-size:var(--font-size-sm);
                       color:var(--color-text-muted);">
            ${Math.round((checkedCount / totalItems) * 100)}%
          </span>
        </div>
        <div class="checklist-progress">
          <div class="checklist-progress-bar" id="progressBar"
            style="width:${Math.round((checkedCount / totalItems) * 100)}%">
          </div>
        </div>
      </div>
      ${data.checklist
        .map(
          (group) => `
        <div class="checklist-group">
          <div class="checklist-group-title">${group.group}</div>
          ${group.items
            .map((item, idx) => {
              const key = `${group.group}_${idx}`;
              const checked = checklistState[key] || false;
              return `
              <div class="checklist-item ${checked ? "checked" : ""}"
                   onclick="toggleCheck('${key}', this)">
                <input type="checkbox"
                  id="chk_${key}"
                  ${checked ? "checked" : ""}
                  onclick="event.stopPropagation();"
                  onchange="toggleCheck('${key}',
                    this.closest('.checklist-item'))">
                <label for="chk_${key}">${item}</label>
              </div>
            `;
            })
            .join("")}
        </div>
      `,
        )
        .join("")}
    `;
        document.getElementById("checklistContent").innerHTML = html;
      }

      function toggleCheck(key, el) {
        checklistState[key] = !checklistState[key];

        // Save to localStorage
        localStorage.setItem(
          `checklist_${currentReligion}`,
          JSON.stringify(checklistState),
        );

        // Update UI
        el.classList.toggle("checked", checklistState[key]);
        const checkbox = el.querySelector('input[type="checkbox"]');
        if (checkbox) checkbox.checked = checklistState[key];

        // Update progress bar
        const data = RELIGION_DATA[currentReligion];
        let total = 0;
        data.checklist.forEach((g) => (total += g.items.length));
        const done = Object.values(checklistState).filter(Boolean).length;
        const pct = Math.round((done / total) * 100);

        const bar = document.getElementById("progressBar");
        if (bar) bar.style.width = pct + "%";

        // Update counter text
        const counter = document.querySelector(
          '#panel-checklist [style*="Progress"]',
        );
        if (counter) {
          counter.textContent = `Progress: ${done} / ${total} completed`;
        }
      }

      function resetChecklist() {
        checklistState = {};
        localStorage.removeItem(`checklist_${currentReligion}`);
        renderChecklist(RELIGION_DATA[currentReligion]);
        showToast("Checklist reset.");
      }

      function handleDownloadPDF() {
        showToast("PDF download will be available in Part 14!");
      }

      // Start the page
      initPage();
    </script>
  </body>
</html>

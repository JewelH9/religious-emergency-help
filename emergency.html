    <style>
      /* ---- Emergency Banner ---- */
      .emergency-banner {
        background: #fef2f2;
        border-bottom: 2px solid var(--color-emergency);
        padding: var(--space-3) 0;
        text-align: center;
        position: fixed;
        top: var(--nav-height);
        left: 0;
        right: 0;
        z-index: 900;
      }
      .emergency-banner p {
        font-size: var(--font-size-sm);
        font-weight: 600;
        color: #991b1b;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
      }
      .pulse-dot {
        width: 8px;
        height: 8px;
        background: var(--color-emergency);
        border-radius: 50%;
        animation: pulse-dot 1.2s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.6);
          opacity: 0.5;
        }
      }

      /* ---- Page Layout ---- */
      .emergency-page {
        padding-top: calc(var(--nav-height) + 52px);
        min-height: 100vh;
        background: var(--color-bg-page);
      }

      /* ---- Religion Selector ---- */
      .religion-selector-wrap {
        background: var(--color-bg-card);
        border-bottom: 1px solid var(--color-border);
        padding: var(--space-4) 0;
        position: sticky;
        top: calc(var(--nav-height) + 52px);
        z-index: 800;
      }
      .religion-tabs {
        display: flex;
        gap: var(--space-2);
        overflow-x: auto;
        padding-bottom: var(--space-1);
        scrollbar-width: none;
      }
      .religion-tabs::-webkit-scrollbar {
        display: none;
      }

      .religion-tab {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        border-radius: var(--radius-full);
        border: 2px solid var(--color-border);
        background: transparent;
        color: var(--color-text-secondary);
        font-size: var(--font-size-sm);
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: all var(--transition);
        flex-shrink: 0;
      }
      .religion-tab:hover {
        border-color: var(--tab-color, var(--color-primary));
        color: var(--tab-color, var(--color-primary));
      }
      .religion-tab.active {
        background: var(--tab-color, var(--color-primary));
        border-color: var(--tab-color, var(--color-primary));
        color: #ffffff;
      }

      /* ---- Main Content Area ---- */
      .emergency-content {
        padding: var(--space-8) 0 var(--space-16);
      }

      /* ---- Guide Header ---- */
      .guide-header {
        display: flex;
        align-items: flex-start;
        gap: var(--space-4);
        margin-bottom: var(--space-8);
        padding: var(--space-6);
        background: var(--color-bg-card);
        border-radius: var(--radius-xl);
        border: 1px solid var(--color-border);
        border-left: 4px solid var(--guide-color, var(--color-primary));
      }
      .guide-header-icon {
        font-size: 2.5rem;
        flex-shrink: 0;
        line-height: 1;
      }
      .guide-header-text h1 {
        font-size: var(--font-size-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        margin-bottom: var(--space-1);
      }
      .guide-header-text p {
        color: var(--color-text-secondary);
        font-size: var(--font-size-sm);
      }
      .guide-actions {
        margin-left: auto;
        display: flex;
        gap: var(--space-3);
        flex-wrap: wrap;
        align-items: flex-start;
      }

      /* ---- Section Tabs ---- */
      .section-nav {
        display: flex;
        gap: var(--space-2);
        margin-bottom: var(--space-6);
        border-bottom: 2px solid var(--color-border);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .section-nav::-webkit-scrollbar {
        display: none;
      }

      .section-tab {
        padding: var(--space-3) var(--space-4);
        font-size: var(--font-size-sm);
        font-weight: 600;
        color: var(--color-text-muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        cursor: pointer;
        white-space: nowrap;
        transition: all var(--transition);
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
      }
      .section-tab:hover {
        color: var(--color-text-primary);
      }
      .section-tab.active {
        color: var(--color-emergency);
        border-bottom-color: var(--color-emergency);
      }

      /* ---- Steps List ---- */
      .steps-container {
        display: none;
      }
      .steps-container.active {
        display: block;
      }

      .step-card {
        display: flex;
        gap: var(--space-4);
        padding: var(--space-5);
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        margin-bottom: var(--space-4);
        transition: all var(--transition);
        animation: fadeInUp 0.3s ease forwards;
      }
      .step-card:hover {
        border-color: var(--color-border-strong);
        box-shadow: var(--shadow-sm);
      }
      .step-card.urgent {
        border-left: 3px solid var(--color-emergency);
        background: #fffbfb;
      }

      .step-num {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: var(--font-size-base);
        color: #fff;
        background: var(--step-color, var(--color-primary));
        flex-shrink: 0;
      }
      .step-body {
        flex: 1;
      }
      .step-title {
        font-size: var(--font-size-base);
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-1);
      }
      .step-detail {
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        line-height: 1.6;
      }
      .step-urgent-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #fef2f2;
        color: var(--color-emergency);
        font-size: var(--font-size-xs);
        font-weight: 700;
        padding: 2px var(--space-2);
        border-radius: var(--radius-full);
        margin-bottom: var(--space-2);
      }

      /* ---- Info Cards ---- */
      .info-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--space-4);
        margin-top: var(--space-6);
      }
      .info-card {
        padding: var(--space-4);
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
      }
      .info-card-title {
        font-size: var(--font-size-sm);
        font-weight: 700;
        margin-bottom: var(--space-2);
      }
      .info-card-body {
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        line-height: 1.6;
      }

      /* ---- Loading state ---- */
      .guide-loading {
        text-align: center;
        padding: var(--space-16);
        color: var(--color-text-muted);
      }

      /* ---- Welcome screen ---- */
      .welcome-screen {
        text-align: center;
        padding: var(--space-16) var(--space-4);
      }
      .welcome-icon {
        font-size: 4rem;
        margin-bottom: var(--space-6);
      }
      .welcome-title {
        font-size: var(--font-size-3xl);
        font-weight: 800;
        color: var(--color-text-primary);
        margin-bottom: var(--space-4);
      }
      .welcome-subtitle {
        font-size: var(--font-size-lg);
        color: var(--color-text-secondary);
        max-width: 480px;
        margin: 0 auto var(--space-8);
      }
      .religion-quick-grid {
        display: flex;
        gap: var(--space-3);
        justify-content: center;
        flex-wrap: wrap;
        max-width: 500px;
        margin: 0 auto;
      }
      .religion-quick-btn {
        padding: var(--space-3) var(--space-5);
        border-radius: var(--radius-full);
        border: 2px solid var(--color-border);
        background: var(--color-bg-card);
        font-size: var(--font-size-base);
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
      }
      .religion-quick-btn:hover {
        border-color: var(--color-emergency);
        color: var(--color-emergency);
        transform: scale(1.05);
      }

      @media (max-width: 768px) {
        .guide-header {
          flex-direction: column;
        }
        .guide-actions {
          margin-left: 0;
        }
      }
    </style>

      // ============================================================
      // EMERGENCY PAGE LOGIC
      // ============================================================

      let activeReligion = null;
      let activeSection = "immediate";

      function selectReligion(religion) {
        activeReligion = religion;

        // Update tab styles
        document.querySelectorAll(".religion-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.religion === religion);
        });

        // Show guide area, hide welcome
        document.getElementById("welcomeScreen").style.display = "none";
        document.getElementById("guideArea").style.display = "block";

        // Render the guide
        renderGuide(religion, "immediate");

        // Update URL without reload (for bookmarking)
        history.replaceState(null, "", `emergency.html?r=${religion}`);

        // Dispatch event so module script can check bookmark state
        window.dispatchEvent(
          new CustomEvent("religionSelected", {
            detail: {
              guideId: religion,
              guideName: GUIDES[religion].name,
            },
          }),
        );
      }

      function renderGuide(religion, section) {
        const guide = GUIDES[religion];
        if (!guide) return;

        activeSection = section;

        // Update guide header
        document.getElementById("guideIcon").textContent = guide.icon;
        document.getElementById("guideTitle").textContent =
          guide.name + " — Emergency Guide";
        document.getElementById("guideSubtitle").textContent = guide.subtitle;
        document.getElementById("guideHeader").style.borderLeftColor =
          guide.color;

        // Update section tabs
        document.querySelectorAll(".section-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.section === section);
        });

        // Render steps
        const steps = guide.sections[section] || [];
        const html = steps
          .map(
            (step, i) => `
      <div class="step-card ${step.urgent ? "urgent" : ""}">
        <div class="step-num" style="background:${guide.color}">${i + 1}</div>
        <div class="step-body">
          ${step.urgent ? '<div class="step-urgent-tag">⚡ Do First</div>' : ""}
          <div class="step-title">${step.title}</div>
          <div class="step-detail">${step.detail}</div>
        </div>
      </div>
    `,
          )
          .join("");

        document.getElementById("stepsArea").innerHTML = html;

        // Render info cards
        const infoHtml = guide.infoCards
          .map(
            (card) => `
      <div class="info-card" style="background:${card.bg}; border-color:${card.bg}">
        <div class="info-card-title" style="color:${card.color}">${card.title}</div>
        <div class="info-card-body">${card.body}</div>
      </div>
    `,
          )
          .join("");
        document.getElementById("infoCards").innerHTML = infoHtml;
      }

      // Section tab clicks
      document
        .getElementById("sectionNav")
        .addEventListener("click", function (e) {
          const tab = e.target.closest(".section-tab");
          if (tab && activeReligion) {
            renderGuide(activeReligion, tab.dataset.section);
          }
        });

      // Religion tab clicks
      document
        .getElementById("religionTabs")
        .addEventListener("click", function (e) {
          const tab = e.target.closest(".religion-tab");
          if (tab) selectReligion(tab.dataset.religion);
        });

      // Bookmark handler (full Firebase logic added in Part 10)
      function handleBookmark() {
        const user = localStorage.getItem("userEmail");
        if (!user) {
          showToast("Please sign in to save bookmarks");
          setTimeout(() => (window.location.href = "login.html"), 1500);
          return;
        }
        showToast("Guide saved to bookmarks!");
        document.getElementById("bookmarkBtn").textContent = "✅ Saved";
      }

      // PDF handler (full logic added in Part 14)
      function handleDownloadPDF() {
        showToast("PDF download feature coming soon!");
      }

      // Check URL param on page load
      window.addEventListener("DOMContentLoaded", () => {
        const param = new URLSearchParams(window.location.search).get("r");
        if (param && GUIDES[param]) {
          selectReligion(param);
        }
      });
    </script>

    <script type="module">
      import { initAuthObserver } from "./js/auth.js";
      import { handleSaveBookmark, checkIfBookmarked } from "./js/bookmarks.js";
      import { auth } from "./js/firebase-config.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      initAuthObserver();

      // Update bookmark button state when religion is selected
      window.addEventListener("religionSelected", async (e) => {
        const { guideId, guideName } = e.detail;
        const btn = document.getElementById("bookmarkBtn");
        if (!btn) return;

        const saved = await checkIfBookmarked(guideId);
        updateBookmarkBtn(btn, saved);
      });

      // Make handleBookmark available globally
      window.handleBookmark = async function () {
        if (!activeReligion) return;

        const btn = document.getElementById("bookmarkBtn");
        const guide = GUIDES[activeReligion];
        const user = localStorage.getItem("userEmail");

        if (!user) {
          showToast("Please sign in to save bookmarks");
          setTimeout(() => (window.location.href = "login.html"), 1500);
          return;
        }

        btn.disabled = true;

        const result = await handleSaveBookmark(
          activeReligion,
          guide.name,
          guide.icon,
        );

        if (result.success) {
          updateBookmarkBtn(btn, true);
          showToast(`${guide.name} saved to bookmarks!`);
        } else if (result.reason === "not-logged-in") {
          showToast("Please sign in to save bookmarks");
          setTimeout(() => (window.location.href = "login.html"), 1500);
        } else {
          showToast("Failed to save. Please try again.");
        }

        btn.disabled = false;
      };

      function updateBookmarkBtn(btn, isSaved) {
        if (isSaved) {
          btn.textContent = "✅ Saved";
          btn.classList.remove("btn-secondary");
          btn.classList.add("btn-ghost");
        } else {
          btn.textContent = "🔖 Save Guide";
          btn.classList.add("btn-secondary");
          btn.classList.remove("btn-ghost");
        }
      }
    </script>
